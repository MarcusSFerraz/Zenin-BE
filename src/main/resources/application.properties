spring.application.name=zenin
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-remember-ms=${JWT_REFRESH_EXPIRATION_REMEMBER_MS:604800000}

# Springdoc / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Upload de arquivos
app.upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${BASE_URL:http://localhost:8080}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
