version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: pg-zenin
    restart: unless-stopped
    environment:
      POSTGRES_DB: zenin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenin -d zenin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: app-zenin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: zenin
      DB_USER: postgres
      DB_PASSWORD: root
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION_MS: 86400000
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"

volumes:
  postgres_data:
