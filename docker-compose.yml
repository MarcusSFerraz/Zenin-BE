services:
  app:
    image: marcussferraz/zenin-backend:latest
    container_name: zenin-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
